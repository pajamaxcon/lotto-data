name: lotto-results

# 매주 토요일 추첨(20:35 KST) 후 결과 수집 → data/lotto-results.json 커밋.
# 앱은 raw.githubusercontent.com 에서 이 파일을 읽는다 (LottoResults.cs).
on:
  schedule:
    - cron: '0 13 * * 6' # 토 22:00 KST — 미러(smok95) 갱신 여유
    - cron: '0 0 * * 0'  # 일 09:00 KST — 미러가 늦었을 때 보충 (증분이라 중복 무해)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/fetch-lotto.mjs
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/lotto-results.json
          git diff --cached --quiet || (git commit -m "로또 회차 결과 갱신" && git push)
